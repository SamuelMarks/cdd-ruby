repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: mixed-line-ending
        args: ['--fix=lf']
        exclude: \.(bat|cmd|ps1)$

  - repo: local
    hooks:
      - id: auto-format
        name: Auto Format
        entry: bundle exec rubocop -A
        language: system
        types: [ruby]
        pass_filenames: false

      - id: lint
        name: Lint
        entry: bundle exec rubocop
        language: system
        types: [ruby]
        pass_filenames: false

      - id: build
        name: Build
        entry: ruby scripts/build.rb
        language: system
        pass_filenames: false

      - id: test
        name: Test
        entry: bundle exec rspec
        language: system
        pass_filenames: false

      - id: update-badges
        name: Update Badges
        entry: ruby scripts/update_coverage.rb
        language: system
        pass_filenames: false

      - id: petstore-swagger-2
        name: Petstore Swagger 2.0 Test
        entry: ruby scripts/test_petstore_swagger_2.rb
        language: system
        pass_filenames: false

      - id: petstore-openapi-3
        name: Petstore OpenAPI 3.2.0 Test
        entry: ruby scripts/test_petstore_openapi_3.rb
        language: system
        pass_filenames: false

      - id: build-wasm
        name: Build WASM
        entry: ruby scripts/build_wasm.rb
        language: system
        pass_filenames: false
