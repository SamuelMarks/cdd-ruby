name: CI
on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
      - 'latest'
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: Install dependencies
        run: |
          gem install bundler
          bundle install
          gem install ruby_wasm
      - name: Run tests
        run: bundle exec rspec
      - name: Update coverage shields
        run: ruby scripts/update_coverage.rb
      - name: Build WASM
        run: make build_wasm
      - name: Build CLI Binary
        run: make build

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: Install dependencies
        run: |
          gem install bundler
          bundle install
          gem install ruby_wasm
      - name: Build WASM
        run: make build_wasm
      - name: Build CLI Binary
        run: make build
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/cdd-ruby.wasm
            bin/*.gem
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
