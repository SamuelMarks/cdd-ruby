name: CI
on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: Install dependencies
        run: |
          gem install bundler
          bundle install
          gem install ruby_wasm
      - name: Run unit tests
        run: bundle exec rspec
      - name: Run E2E Test (Swagger 2.0 SDK vs Docker)
        run: ruby scripts/test_petstore_swagger_2.rb
      - name: Run E2E Test (OpenAPI 3.0 SDK vs Docker)
        run: ruby scripts/test_petstore_openapi_3.rb
      - name: Run E2E Test (Swagger 2.0 Generated Server vs SDK)
        run: ruby scripts/test_generated_server_swagger_2.rb
      - name: Run E2E Test (OpenAPI 3.0 Generated Server vs SDK)
        run: ruby scripts/test_generated_server_openapi_3.rb
      - name: Update coverage shields
        run: ruby scripts/update_coverage.rb
      - name: Build WASM
        run: make build_wasm
      - name: Build CLI Binary
        run: make build

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: Install dependencies
        run: |
          gem install bundler
          bundle install
          gem install ruby_wasm
      - name: Build WASM
        run: make build_wasm
      - name: Build CLI Binary
        run: make build
      - name: Create Versioned Release
        uses: softprops/action-gh-release@v3
        with:
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            dist/cdd-ruby.wasm
            bin/*.gem
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Update 'latest' tag
        run: |
          git tag -f latest
          git push -f origin latest
      - name: Create Latest Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: latest
          make_latest: false
          fail_on_unmatched_files: true
          files: |
            dist/cdd-ruby.wasm
            bin/*.gem
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

