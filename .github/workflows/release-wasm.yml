name: Release WASM

on:
  push:
    tags:
      - '0.0.1'
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build WASM
        run: |
          make install_base
          make build_wasm
          cp dist/cdd-ruby.wasm .
      - name: Release WASM Artifact
        uses: softprops/action-gh-release@v2
        with:
          files: cdd-ruby.wasm
